# Nginx Virtual Host Template for CloudKu
# Domain: {{DOMAIN_NAME}}
# User: {{USER_NAME}}
# Document Root: {{DOCUMENT_ROOT}}
# Generated: {{TIMESTAMP}}

server {
    listen 80;
    listen [::]:80;
    
    server_name {{DOMAIN_NAME}} www.{{DOMAIN_NAME}};
    
    root {{DOCUMENT_ROOT}};
    index index.html index.htm index.php;
    
    # Charset
    charset utf-8;
    
    # Logging
    access_log /var/log/nginx/{{DOMAIN_NAME}}-access.log;
    error_log /var/log/nginx/{{DOMAIN_NAME}}-error.log;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss application/json;
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # PHP Support (if enabled)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php{{PHP_VERSION}}-fpm-{{USER_NAME}}.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # PHP FastCGI tuning
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_read_timeout 300;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # WordPress specific (if needed)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    
    # Laravel specific (if needed)
    # location / {
    #     try_files $uri $uri/ /index.php?$query_string;
    # }
    
    # Security: Block access to sensitive files
    location ~ /(\.env|\.git|\.htaccess|\.htpasswd|composer\.json|composer\.lock|package\.json) {
        deny all;
    }
    
    # Prevent PHP execution in uploads directory
    location ~* /uploads/.*\.php$ {
        deny all;
    }
}
